services:
  postgres:
    image: postgres:16
    container_name: axiom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: axiom
      POSTGRES_USER: axiom
      POSTGRES_PASSWORD: axiom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: axiom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
